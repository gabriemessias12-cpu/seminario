server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # ── Gzip ──────────────────────────────────────────────────────────────────
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml
    font/woff2;

  # ── Security headers ──────────────────────────────────────────────────────
  add_header X-Frame-Options          "SAMEORIGIN"           always;
  add_header X-Content-Type-Options   "nosniff"              always;
  add_header X-XSS-Protection         "1; mode=block"        always;
  add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;

  # ── Static assets — long cache (content-hashed by Vite) ──────────────────
  location ~* \.(?:js|css|woff2?|ttf|eot|ico|png|jpg|jpeg|gif|svg|webp|avif)$ {
    expires 1y;
    add_header Cache-Control "public, immutable";
    # Re-apply security headers (add_header doesn't inherit in nested blocks)
    add_header X-Frame-Options        "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"              always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
    access_log off;
  }

  # ── index.html — no cache (always re-validate) ────────────────────────────
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma        "no-cache";
    add_header Expires       "0";
    add_header X-Frame-Options        "SAMEORIGIN"           always;
    add_header X-Content-Type-Options "nosniff"              always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
  }

  # ── API proxy → backend ───────────────────────────────────────────────────
  location /api/ {
    proxy_pass         http://server:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   Upgrade           $http_upgrade;
    proxy_set_header   Connection        "upgrade";
    proxy_read_timeout 300s;
    client_max_body_size 50m;
  }

  location /uploads/ {
    proxy_pass         http://server:3001;
    proxy_http_version 1.1;
    proxy_set_header   Host            $host;
    proxy_set_header   X-Real-IP       $remote_addr;
    proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 120s;
    client_max_body_size 50m;
  }

  # ── SPA fallback ──────────────────────────────────────────────────────────
  location / {
    try_files $uri $uri/ /index.html;
  }
}
